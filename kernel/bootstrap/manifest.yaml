# =============================================================================
# CAMEAL Kernel Bootstrap Manifest
# =============================================================================

name: kernel.bootstrap

display_name: CAMEAL Kernel Bootstrap

description: >
  Bootstrap subsystem responsible for constructing and validating the
  CAMEAL runtime. It loads configuration, discovers plugins, registers
  runtime components, validates dependencies, and builds the Kernel.

version: 1.0.0
api_version: 1.0
status: stable

type: kernel-subsystem

owner: CAMEAL Project

license: Apache-2.0

python: ">=3.11"

# -----------------------------------------------------------------------------
# Responsibilities
# -----------------------------------------------------------------------------

responsibilities:
  - Runtime initialization
  - Configuration loading
  - Manifest loading
  - Plugin discovery
  - Dependency registration
  - Dependency graph construction
  - Runtime validation
  - Kernel construction
  - Startup orchestration

# -----------------------------------------------------------------------------
# Public API
# -----------------------------------------------------------------------------

exports:

  bootstrap:
    - Bootstrap
    - Builder
    - Configuration

# -----------------------------------------------------------------------------
# Internal Components
# -----------------------------------------------------------------------------

internals:
  - Discovery
  - Loader
  - Registrar
  - Validator
  - Initializer
  - DependencyGraph

# -----------------------------------------------------------------------------
# Dependencies
# -----------------------------------------------------------------------------

dependencies:

  required:
    kernel:
      - container
      - lifecycle
      - context
      - events
      - managers
      - models

  optional:
    kernel:
      - scheduler
      - orchestrator

# -----------------------------------------------------------------------------
# Lifecycle
# -----------------------------------------------------------------------------

lifecycle:

  initialize: true
  validate: true
  boot: true
  start: false
  execute: false
  stop: false
  shutdown: false
  dispose: false

# -----------------------------------------------------------------------------
# Runtime Characteristics
# -----------------------------------------------------------------------------

thread_safe: true

request_scoped: false

supports_async: false

# -----------------------------------------------------------------------------
# Events
# -----------------------------------------------------------------------------

publishes:
  - bootstrap.started
  - bootstrap.completed
  - runtime.initialized
  - runtime.validated

subscribes: []

# -----------------------------------------------------------------------------
# Diagnostics
# -----------------------------------------------------------------------------

diagnostics:

  metrics: true
  tracing: true
  logging: true
  health_checks: true

# -----------------------------------------------------------------------------
# Extension Points
# -----------------------------------------------------------------------------

extension_points:

  - configuration_loader
  - manifest_loader
  - plugin_discovery
  - dependency_registration

# -----------------------------------------------------------------------------
# Compatibility
# -----------------------------------------------------------------------------

compatibility:

  api: "1.x"
  kernel: "1.x"

# -----------------------------------------------------------------------------
# Metadata
# -----------------------------------------------------------------------------

tags:
  - kernel
  - bootstrap
  - runtime
  - initialization
  - dependency-injection

documentation:
  - README.md
  - ARCHITECTURE.md
  - DESIGN.md
  - API.md
  - EXECUTION_FLOW.md
